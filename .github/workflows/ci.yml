name: CI

on:
  push:
    branches: [ main, harden-real-runtime ]
  pull_request:
    branches: [ main, harden-real-runtime ]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run ruff
        run: uv run ruff check .

      - name: Run pytest
        run: uv run pytest -q

      - name: Run compileall
        run: uv run python -m compileall -q src tests alembic
