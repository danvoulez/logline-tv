x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "3"

x-adult-env: &adult-env
  XVIDEOS_EMAIL: ${XVIDEOS_EMAIL:-}
  XVIDEOS_PASSWORD: ${XVIDEOS_PASSWORD:-}
  PORNHUB_EMAIL: ${PORNHUB_EMAIL:-}
  PORNHUB_PASSWORD: ${PORNHUB_PASSWORD:-}
  GAYBOYFRIENDTV_EMAIL: ${GAYBOYFRIENDTV_EMAIL:-}
  GAYBOYFRIENDTV_PASSWORD: ${GAYBOYFRIENDTV_PASSWORD:-}
  FABHUSE_EMAIL: ${FABHUSE_EMAIL:-}
  FABHUSE_PASSWORD: ${FABHUSE_PASSWORD:-}
  ADULT_FOLLOW_USER: ${ADULT_FOLLOW_USER:-CompactTreasure240}
  LOCAL_LLM_URL: ${LOCAL_LLM_URL:-http://192.168.5.2:11434}
  OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
  PEXELS_API_KEY: ${PEXELS_API_KEY:-}
  BROWSER_PROFILES_DIR: ${BROWSER_PROFILES_DIR:-/spool/browser_profiles}

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: voulezvous
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    logging: *default-logging

  migrate:
    build: .
    command: alembic upgrade head
    environment:
      DATABASE_URL_SYNC: postgresql://postgres:postgres@db:5432/voulezvous
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/voulezvous
    depends_on:
      db:
        condition: service_healthy
    logging: *default-logging

  api:
    build: .
    command: app api --host 0.0.0.0 --port 8000
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/voulezvous
      DATABASE_URL_SYNC: postgresql://postgres:postgres@db:5432/voulezvous
      SPOOL_ROOT: ${SPOOL_ROOT:-/spool}
      STREAM_TARGET: ${STREAM_TARGET:-null}
      FALLBACK_VIDEO: ${FALLBACK_VIDEO:-fallback.mp4}
      PREP_LOOKAHEAD_HOURS: ${PREP_LOOKAHEAD_HOURS:-6}
      DELETE_AFTER_STREAM: ${DELETE_AFTER_STREAM:-true}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      <<: *adult-env
    volumes:
      - spool:/spool
    depends_on:
      migrate:
        condition: service_completed_successfully
    logging: *default-logging

  prep-worker:
    build: .
    command: app prep-worker --interval 30
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/voulezvous
      DATABASE_URL_SYNC: postgresql://postgres:postgres@db:5432/voulezvous
      SPOOL_ROOT: ${SPOOL_ROOT:-/spool}
      STREAM_TARGET: ${STREAM_TARGET:-null}
      FALLBACK_VIDEO: ${FALLBACK_VIDEO:-fallback.mp4}
      PREP_LOOKAHEAD_HOURS: ${PREP_LOOKAHEAD_HOURS:-6}
      DELETE_AFTER_STREAM: ${DELETE_AFTER_STREAM:-true}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - spool:/spool
    depends_on:
      migrate:
        condition: service_completed_successfully
    logging: *default-logging

  streamer:
    build: .
    command: app streamer
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/voulezvous
      DATABASE_URL_SYNC: postgresql://postgres:postgres@db:5432/voulezvous
      SPOOL_ROOT: ${SPOOL_ROOT:-/spool}
      STREAM_TARGET: ${STREAM_TARGET:-null}
      FALLBACK_VIDEO: ${FALLBACK_VIDEO:-fallback.mp4}
      DELETE_AFTER_STREAM: ${DELETE_AFTER_STREAM:-true}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - spool:/spool
    depends_on:
      migrate:
        condition: service_completed_successfully
    logging: *default-logging

  # Acquisition subsystem — seed + orchestrator run
  acq-seed:
    build: .
    command: app seed-acquisition-data
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/voulezvous
      DATABASE_URL_SYNC: postgresql://postgres:postgres@db:5432/voulezvous
    depends_on:
      migrate:
        condition: service_completed_successfully
    profiles: ["acq"]
    logging: *default-logging

  acq-orchestrator:
    build: .
    command: app orchestrator run-daily
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/voulezvous
      DATABASE_URL_SYNC: postgresql://postgres:postgres@db:5432/voulezvous
      SPOOL_ROOT: ${SPOOL_ROOT:-/spool}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      <<: *adult-env
    volumes:
      - spool:/spool
      - browser_profiles:/spool/browser_profiles
    depends_on:
      migrate:
        condition: service_completed_successfully
    profiles: ["acq"]
    logging: *default-logging

volumes:
  pgdata:
  spool:
  browser_profiles:
